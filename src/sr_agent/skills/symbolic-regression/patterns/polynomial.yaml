# 多项式公式模式

适用于非线性但光滑变化的数据。

## 基本形式

```
y = a_n * x^n + a_{n-1} * x^{n-1} + ... + a_1 * x + a_0
```

## 常见阶数

### 一次多项式（线性）

```
y = a * x + b
```

**形状**：直线

---

### 二次多项式

```
y = a * x**2 + b * x + c
```

**形状**：抛物线
**特征**：
- 有极大值或极小值
- 关于顶点对称

**典型场景**：
- 抛体运动轨迹
- 面积与边长关系
- 成本 - 收益优化

---

### 三次多项式

```
y = a * x**3 + b * x**2 + c * x + d
```

**形状**：S 型或反 S 型
**特征**：
- 最多两个极值点
- 有拐点

**典型场景**：
- 相变曲线
- 人口增长（带饱和）

---

## 多变量多项式

```
y = a * x1**2 + b * x2**2 + c * x1 * x2 + d * x1 + e * x2 + f
```

**注意**：
- 项数随变量数和阶数指数增长
- 使用 `interaction_blacklist` 控制复杂度

---

## 使用建议

1. **从低阶开始**：`max_degree=2`，逐步增加
2. **检查 adjusted_r_squared**：防止过拟合
3. **分析系数显著性**：p_value > 0.05 的项可考虑移除
4. **使用约束**：
   ```python
   polynomial_fit(
       max_degree=3,
       include_interactions=False  # 不要交叉项
   )
   ```

## 典型场景

- 泰勒展开近似
- 响应面建模
- 经验公式拟合
