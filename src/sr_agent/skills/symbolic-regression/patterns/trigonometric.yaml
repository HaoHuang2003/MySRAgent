# 三角函数模式

适用于周期性、波动性数据。

## 基本形式

```
y = A * sin(B * x + C) + D
```

**参数含义**：
- A: 振幅（Amplitude）
- B: 角频率（ω = 2π/周期）
- C: 相位偏移
- D: 垂直偏移（平均值）

---

## 常见变体

### 正弦波

```
y = A * sin(B * x) + D
```

---

### 余弦波

```
y = A * cos(B * x) + D
```

---

### 多频率叠加

```
y = A1 * sin(B1 * x) + A2 * sin(B2 * x) + D
```

**适用于**：
- 复合周期信号
- 傅里叶级数近似

---

### 阻尼振荡

```
y = A * exp(-k * x) * sin(B * x) + D
```

**适用于**：
- 阻尼振动
- 衰减波动

---

### 调制波

```
y = (A + B * sin(C * x)) * sin(D * x) + E
```

**适用于**：
- 振幅调制信号

---

## 识别特征

| 特征 | 判断方法 |
|------|----------|
| 周期性 | 数据重复出现相似模式 |
| 频谱分析 | FFT 有显著峰值 |
| 自相关 | 自相关函数周期性衰减 |

---

## 使用建议

1. **先做 FFT 分析**：确定主频率
2. **估计初始参数**：
   - A = (max - min) / 2
   - D = (max + min) / 2
   - B = 2π / 周期
3. **使用 fit=True**：让 BFGS 优化参数
4. **多频率尝试**：从单频开始，逐步叠加

## 典型场景

- 季节变化数据
- 生物节律（心跳、脑电波）
- 机械振动
- 交流电信号
- 潮汐现象
