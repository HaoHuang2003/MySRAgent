# 线性公式模式

适用于单调变化、无线性关系的数据。

## 基本形式

```
y = a * x1 + b * x2 + ... + c
```

## 变体

### 单变量线性

```
y = a * x + b
```

**特征**：
- 散点图呈直线
- 一阶差分近似常数

---

### 多变量线性

```
y = a1 * x1 + a2 * x2 + ... + b
```

**特征**：
- 每个变量独立贡献
- 无交互作用

---

### 带交互项的线性

```
y = a * x1 + b * x2 + c * x1 * x2 + d
```

**特征**：
- 变量之间存在协同效应
- 一个变量的影响依赖于另一个变量

---

## 使用建议

1. 先用 `polynomial_fit(max_degree=1)` 测试纯线性关系
2. 如拟合不佳，尝试 `polynomial_fit(max_degree=2)` 探索二次项
3. 分析残差，判断是否需要非线性项

## 典型场景

- 物理定律（如胡克定律 F = kx）
- 经济模型（如线性需求曲线）
- 近似建模（局部线性化）
